<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GitHub Foundations Certification Practice Quiz</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3; --muted:#8b949e;
    --accent:#2f81f7; --green:#238636; --green-bg:#12261e; --green-bd:#2ea043;
    --red:#da3633; --red-bg:#25171c; --red-bd:#f85149; --yellow:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.5}
  .wrap{max-width:1240px;margin:0 auto;padding:28px clamp(16px,4vw,40px) 80px}
  header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  header svg{flex:0 0 auto}
  h1{font-size:clamp(18px,2.2vw,22px);margin:0;flex:1}
  .iconbtn{font:inherit;font-size:13px;font-weight:600;background:#21262d;color:var(--text);
    border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;white-space:nowrap}
  .iconbtn:hover{border-color:#8b949e}
  .scoretally{font:inherit;font-size:13px;font-weight:700;white-space:nowrap;
    border:1px solid var(--border);border-radius:8px;padding:7px 12px;
    background:#161b22;color:var(--text)}
  .scoretally b{font-weight:700}
  .scoretally .pct{color:#3fb950}
  .scoretally.low .pct{color:#f85149}
  .scoretally .frac{color:#8b949e;font-weight:600}
  .search{display:flex;gap:8px;margin:4px 0 0}
  .search input{flex:1;font:inherit;font-size:14px;background:var(--panel);color:var(--text);
    border:1px solid var(--border);border-radius:8px;padding:9px 12px}
  .search input:focus{outline:none;border-color:var(--accent)}
  .filternote{font-size:13px;color:var(--muted);margin:10px 0 0;padding:8px 12px;
    background:#0f1c16;border-left:3px solid var(--green-bd);border-radius:6px}
  .filternote.none{background:var(--red-bg);border-left-color:var(--red-bd);color:#f0b0ac}
  .filternote a{color:var(--accent)}
  .layout{display:flex;gap:clamp(20px,3vw,36px);align-items:flex-start;margin-top:18px}
  .main{flex:1;min-width:0}
  .sidebar{flex:0 0 270px;position:sticky;top:18px;max-height:calc(100vh - 96px);overflow:auto;
    background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 14px}
  .side-h{display:flex;align-items:center;gap:8px;margin:2px 4px 12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .side-h .ttl{flex:1;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .side-h button{font:inherit;font-size:11.5px;font-weight:600;background:#21262d;color:var(--text);
    border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer}
  .side-h button:hover{border-color:#8b949e}
  .sublist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:3px}
  .sublist label{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;cursor:pointer;
    font-size:14px;transition:background .12s}
  .sublist label:hover{background:#0d1117}
  .sublist label.on{background:#10243b}
  .sublist input{width:16px;height:16px;accent-color:var(--accent);flex:0 0 auto;cursor:pointer}
  .sublist .lbl{flex:1;min-width:0;line-height:1.35}
  .sublist .cntwrap{display:flex;align-items:center;gap:6px;flex:0 0 auto}
  .sublist .cnt{font-size:11.5px;color:var(--muted);background:#0d1117;border:1px solid var(--border);
    border-radius:999px;padding:1px 9px;line-height:1.5;white-space:nowrap}
  .sublist .cnt.answered{color:#fff;font-weight:600;background:#10243b;border-color:#1f6feb}
  .sublist .savg{font-size:11px;color:#7ee0a0;background:#0d1117;border:1px solid #2ea04326;
    border-radius:999px;padding:1px 7px;line-height:1.5;white-space:nowrap}
  .sublist .savg:empty{display:none}
  @media (max-width:1080px){ .sidebar{flex-basis:240px} }
  @media (max-width:860px){
    .layout{flex-direction:column;gap:18px}
    .sidebar{flex:none;width:100%;position:static;max-height:none;order:-1;padding:14px}
    .sublist{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:4px}
  }
  .bar{height:8px;background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:16px 0 6px}
  .bar>div{height:100%;background:linear-gradient(90deg,#1f6feb,#2ea043);width:0;transition:width .3s}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:18px;gap:10px}
  .meta .save{color:var(--green-bd);font-size:12px}
  .livetimer{display:none;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);
    background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:3px 4px 3px 10px;flex:0 0 auto}
  .livetimer.paused{border-color:var(--yellow);color:var(--yellow)}
  .livetimer .tclock{font-variant-numeric:tabular-nums;font-weight:600}
  .livetimer .tbtn{font:inherit;font-size:11.5px;font-weight:600;background:#21262d;color:var(--text);
    border:1px solid var(--border);border-radius:6px;padding:3px 9px;cursor:pointer}
  .livetimer .tbtn:hover{border-color:#8b949e}
  .livetimer.paused .tbtn{border-color:var(--yellow);color:var(--yellow)}
  .pauseoverlay{display:none;position:absolute;inset:0;border-radius:14px;
    background:rgba(13,17,23,.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    align-items:center;justify-content:center;z-index:5}
  .pausebox{text-align:center;padding:24px}
  .pausebox .picon{font-size:42px;margin-bottom:6px}
  .pausebox .ptxt{font-size:18px;font-weight:700;margin-bottom:4px}
  .pausebox .psub{font-size:13px;color:var(--muted);margin:0 auto 18px;max-width:340px}
  .timeropt{background:#0d1117;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin:0 0 18px}
  .timeropt .chk{display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:14px;margin:0}
  .timeropt .chk input{width:18px;height:18px;margin-top:1px;accent-color:var(--accent);cursor:pointer;flex:0 0 auto}
  .timeropt .chk b{color:#fff}
  .timeropt .chk .sub{display:block;color:var(--muted);font-size:12.5px;margin-top:3px}
  .subjbreak{margin-top:28px;text-align:left}
  .subjbreak h3{margin:0 0 4px;font-size:16px}
  .sbhint{margin:0 0 12px;font-size:12.5px;color:var(--muted)}
  .sbrow{padding:12px 0;border-top:1px solid var(--border)}
  .sbhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .sbname{font-weight:600;font-size:14px}
  .sbacc{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
  .sbacc.good{color:#3fb950}.sbacc.mid{color:#d29922}.sbacc.low{color:#f85149}
  .sbbar{height:6px;background:#0d1117;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin:7px 0}
  .sbfill{display:block;height:100%}
  .sbfill.good{background:#2ea043}.sbfill.mid{background:#d29922}.sbfill.low{background:#da3633}
  .sbsub{font-size:12.5px;color:var(--muted)}
  .card{position:relative;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:clamp(18px,3vw,32px)}
  .qhead{max-width:860px}
  .qtype{display:inline-block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--border);border-radius:999px;padding:2px 10px;margin-bottom:14px}
  .qtype.multi{color:#e6edf3;font-weight:700;border-color:#3fb950;background:rgba(63,185,80,.15)}
  .qtype .num{color:#fff;font-weight:800}
  .hint.multi{color:#e6edf3;font-size:14px;font-weight:600}
  .hint .num{color:#fff;font-weight:800;background:rgba(63,185,80,.20);
    border:1px solid #3fb950;border-radius:6px;padding:0 7px}
  .qtext{font-size:clamp(17px,1.4vw,20px);font-weight:600;margin:0 0 20px;white-space:pre-wrap;
    max-width:860px;line-height:1.45}
  .options{display:flex;flex-direction:column;gap:11px;max-width:860px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--border);border-radius:10px;
    padding:13px 14px;cursor:pointer;background:#0d1117;transition:border-color .15s,background .15s}
  .opt:hover{border-color:#484f58}
  .opt input{margin-top:3px;width:17px;height:17px;accent-color:var(--accent);flex:0 0 auto;cursor:pointer}
  .opt .txt{flex:1;white-space:pre-wrap}
  .opt.correct{background:var(--green-bg);border-color:var(--green-bd)}
  .opt.incorrect{background:var(--red-bg);border-color:var(--red-bd)}
  .opt.locked{cursor:default}
  .tag{font-size:11px;font-weight:700;padding:1px 8px;border-radius:999px;margin-left:8px;white-space:nowrap}
  .tag.g{background:var(--green-bd);color:#fff}
  .tag.r{background:var(--red-bd);color:#fff}
  .verdict{margin:16px 0 0;font-weight:700;font-size:16px;display:none}
  .verdict.correct{color:var(--green-bd);display:block}
  .verdict.incorrect{color:var(--red-bd);display:block}
  .reinsert{font-weight:500;color:var(--yellow);font-size:13px;margin-top:4px;display:none}
  .explain{margin-top:14px;padding:12px 14px;border-left:3px solid var(--green-bd);
    background:#0f1c16;border-radius:6px;color:#c9d1d9;font-size:14px;white-space:pre-wrap;display:none}
  .actions{display:flex;gap:12px;margin-top:20px;flex-wrap:wrap}
  button{font:inherit;font-weight:600;border-radius:8px;padding:10px 20px;cursor:pointer;border:1px solid transparent}
  .primary{background:var(--green);color:#fff;border-color:#2ea04366}
  .primary:hover{background:#2ea043}
  .primary:disabled{opacity:.5;cursor:not-allowed}
  .secondary{background:#21262d;color:var(--text);border-color:var(--border)}
  .secondary:hover{border-color:#8b949e}
  .actions-right{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
  .ghost{background:transparent;color:var(--muted);border-color:var(--border);font-weight:600}
  .ghost:hover{color:var(--text);border-color:#8b949e;background:#161b22}
  .ghost.danger:hover{color:#f85149;border-color:#f85149;background:rgba(248,81,73,.08)}
  .ghost.finish{color:#79c0ff;border-color:#1f4d80}
  .ghost.finish:hover{color:#cae8ff;border-color:var(--accent);background:rgba(47,129,247,.10)}
  .resetrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:26px;
    padding-top:18px;border-top:1px solid var(--border);max-width:560px}
  .resetrow .resethint{font-size:12px;color:var(--muted);flex:1;min-width:200px}
  .hint{color:var(--muted);font-size:13px;margin-top:10px}
  @media (max-width:560px){
    header{flex-wrap:wrap}
    .opt{padding:14px}
    .actions{gap:10px}
    .actions button{flex:1 1 auto}
  }
  .resume h2{margin:0 0 8px}
  .resume p{color:var(--muted);margin:0 0 18px}
  /* count slider */
  .setup{padding:8px 4px 4px}
  .setup .lead{color:var(--muted);margin:0 0 18px}
  .countbox{background:#0d1117;border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin:0 0 22px;max-width:560px}
  .countbox .row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
  .countbox .lbl{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .countbox .val{font-size:30px;font-weight:800;color:var(--accent)}
  .countbox .val small{font-size:14px;font-weight:600;color:var(--muted)}
  input[type=range].slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:6px;
    background:var(--border);outline:none;margin:6px 0 4px;cursor:pointer}
  input[type=range].slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;
    border-radius:50%;background:var(--accent);border:3px solid #0d1117;cursor:pointer;box-shadow:0 0 0 1px var(--accent)}
  input[type=range].slider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--accent);
    border:3px solid #0d1117;cursor:pointer}
  .ticks{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:2px}
  .ticks span{cursor:pointer;padding:2px 4px;border-radius:4px}
  .ticks span:hover{color:var(--text);background:#161b22}
  .ticks span.on{color:var(--accent);font-weight:700}
  .prioropts{background:#0d1117;border:1px solid var(--border);border-radius:12px;
    padding:16px 20px;margin:0 0 22px;max-width:560px}
  .prioropts .ptitle{font-size:13px;color:var(--muted);margin:0 0 12px}
  .prioropts .ptitle b{color:var(--text)}
  .prioropts .chk{display:flex;align-items:flex-start;gap:10px;cursor:pointer;
    padding:9px 0;font-size:15px;color:var(--text);line-height:1.4}
  .prioropts .chk + .chk{border-top:1px solid var(--border)}
  .prioropts .chk input{width:18px;height:18px;margin-top:1px;accent-color:var(--accent);cursor:pointer;flex:0 0 auto}
  .prioropts .chk b{color:#fff}
  .typesel{display:flex;gap:0;margin:0 0 22px;max-width:560px;border:1px solid var(--border);
    border-radius:12px;overflow:hidden}
  .typesel button{flex:1;font:inherit;font-size:14px;font-weight:600;color:var(--muted);
    background:#0d1117;border:0;border-right:1px solid var(--border);padding:14px 10px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1.2}
  .typesel button:last-child{border-right:0}
  .typesel button .cnt{font-size:12px;font-weight:600;color:var(--muted)}
  .typesel button:hover{background:#161b22;color:var(--text)}
  .typesel button.on{background:rgba(63,185,80,.15);color:#fff}
  .typesel button.on .cnt{color:#3fb950}
  /* improvement areas */
  .focusbanner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:14px;color:#cfe3ff;
    margin:12px 0 0;padding:10px 14px;background:#0d1f33;border-left:3px solid var(--accent);border-radius:8px}
  .focusbanner button{margin-left:auto}
  .misslist{list-style:decimal;margin:6px 0 22px;padding-left:24px;max-width:760px;
    max-height:340px;overflow:auto;display:flex;flex-direction:column;gap:10px}
  .misslist li{color:#c9d1d9;line-height:1.4}
  .misslist li .mtype{font-size:11px;color:var(--yellow);text-transform:uppercase;letter-spacing:.04em;margin-left:6px}
  .emptybox{color:var(--muted);background:#0d1117;border:1px dashed var(--border);border-radius:10px;padding:22px;text-align:center}
  /* summary */
  .summary{text-align:center;padding:30px 22px}
  .summary h2{margin:0 0 18px;font-size:24px}
  .score{font-size:56px;font-weight:800;margin:6px 0}
  .score.good{color:var(--green-bd)} .score.mid{color:var(--yellow)} .score.low{color:var(--red-bd)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:22px 0}
  .stat{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:14px}
  .stat .n{font-size:24px;font-weight:700}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .footer{color:var(--muted);font-size:12px;text-align:center;margin-top:30px}
  .coursebar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:0 0 14px}
  .coursebar .clbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-right:2px}
  .coursebar .cbtn{background:#0d1117;border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s}
  .coursebar .cbtn:hover{border-color:#3d444d;color:#e6edf3}
  .coursebar .cbtn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
  .coursebar .cbtn .cc{opacity:.7;font-weight:500;margin-left:7px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg height="30" width="30" viewBox="0 0 16 16" fill="#e6edf3"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
    <h1 id="quizTitle">GitHub Foundations Certification Practice Quiz</h1>
    <span id="scoreTally" class="scoretally" style="display:none" title="Running percentage of answers you've gotten correct this session"></span>
    <button id="improveBtn" class="iconbtn" style="display:none" title="Review and practice the questions you missed">⚑ Improvement areas</button>
    <button id="restartBtn" class="iconbtn" style="display:none" title="Start the quiz over">↻ Restart</button>
  </header>

  <div class="coursebar" id="courseBar"></div>

  <div class="search">
    <input id="searchInput" type="search" autocomplete="off"
      placeholder="🔍 Filter by topic — e.g. pull request, Actions, billing — then press Enter">
    <button id="searchClear" class="iconbtn" style="display:none" title="Show all questions">Clear</button>
  </div>
  <div id="filterNote" class="filternote" style="display:none"></div>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-h">
        <span class="ttl">Subjects</span>
        <button id="subAll" title="Select every subject">All</button>
        <button id="subClear" title="Clear selection">Clear</button>
      </div>
      <ul id="subList" class="sublist"></ul>
    </aside>

    <div class="main">
      <div class="bar"><div id="prog"></div></div>
      <div class="meta">
        <span id="counter"></span>
        <span id="saveState" class="save"></span>
        <span id="remaining"></span>
        <span id="liveTimer" class="livetimer" style="display:none"></span>
      </div>

      <div id="quiz" class="card"></div>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [{"question": "What happens if you lose internet connectivity while using a Codespace?", "type": "single", "options": [{"text": "If the connection to the internet is lost while working in a Codespace, edit access is lost until connectivity is recovered.", "correct": true}, {"text": "Codespaces don't require an internet connection. You can access your Codespace regardless of connectivity.", "correct": false}, {"text": "If you lose internet connection while working on your Codespace, your unsaved changes are lost.", "correct": false}, {"text": "Nothing happens. Everything is always saved regardless of internet access.", "correct": false}], "explanation": "A Codespace is a remote development environment and requires an active internet connection to interact with it. If the internet connection is lost, the environment remains until a connection is reestablished. Changes are stored within the remote environment until committed and", "course": "foundations", "source": "image1.jpg"}, {"question": "What's the maximum number of Codespaces that you can create per repository or branch?", "type": "single", "options": [{"text": "You can only create two Codespaces.", "correct": false}, {"text": "You can create a total of ten Codespaces.", "correct": false}, {"text": "You can create a total of thirty Codespaces.", "correct": false}, {"text": "You can create an unlimited number of Codespaces.", "correct": true}], "explanation": "You can create an unlimited number of Codespaces per repository or branch assuming there is available storage.", "course": "foundations", "source": "image2.png"}, {"question": "What is a good way to make sure you're integrating the most secure versions of your project dependencies?", "type": "single", "options": [{"text": "Configure your package files to always use the latest versions of dependencies.", "correct": false}, {"text": "Check each project's security details closely before adding it to your dependencies by confirming its version status across multiple advisory sites.", "correct": false}, {"text": "Enable Dependabot for your repository.", "correct": true}, {"text": "Enable repository dependency graph alerts.", "correct": false}], "explanation": "Dependabot scans your repository's dependency manifests and notifies you via an alert and pull request whenever a utilized version or upstream dependency is discovered as insecure.", "course": "foundations", "source": "image4.png"}, {"question": "Which of the following roles are available for a repository at the organization level on GitHub?", "type": "multiple", "options": [{"text": "Delete", "correct": false}, {"text": "Write", "correct": true}, {"text": "Read", "correct": true}, {"text": "Triage", "correct": true}, {"text": "Admin", "correct": true}, {"text": "Maintain", "correct": true}], "explanation": null, "course": "foundations", "source": "image5.png"}, {"question": "What is the difference between a GitHub organization account and a GitHub personal/user account?", "type": "single", "options": [{"text": "An organization account is intended for multiple people and teams, while personal/user accounts are typically for individuals.", "correct": true}, {"text": "You pay more for organization accounts versus personal/user accounts.", "correct": false}, {"text": "They are exactly the same.", "correct": false}, {"text": "Personal/ user accounts have more access than organization accounts.", "correct": false}], "explanation": "Organizations are shared accounts where an unlimited number of people can collaborate across many projects at once and with tiered permissions.", "course": "foundations", "source": "image6.png"}, {"question": "How does GitHub help people that want to write proper issue and pull request comments but don't know Markdown syntax?", "type": "single", "options": [{"text": "There is a text formatting toolbar on issue and pull request comment forms which generates Markdown for you.", "correct": true}, {"text": "GitHub pull request }, {"text": "A repository that tracks the same project but resides somewhere else.", "correct": true}], "explanation": "Remotes are references to other repositories for collaboration and synchronization.", "course": "foundations", "source": "image13.png"}, {"question": "Which search query finds all open issues labeled test that mention 'fix' in their body text?", "type": "single", "options": [{"text": "type:issue label:test is:open body:\"fix\"", "correct": false}, {"text": "is:issue in:comments label:test \"fix\"", "correct": false}, {"text": "is:pr is:open label:test \"fix\"", "correct": false}, {"text": "is:issue is:open label:test \"fix\"", "correct": true}], "explanation": null, "course": "foundations", "source": "image14.png"}, {"question": "Which feature in GitHub Projects enables you to effortlessly generate graphs and charts for visualizing the current status and historical progression of your project?", "type": "single", "options": [{"text": "Project Insights", "correct": true}, {"text": "GitHub Actions", "correct": false}, {"text": "Copilot Charts", "correct": false}, {"text": "Milestones", "correct": false}], "explanation": null, "course": "foundations", "source": "image15.png"}, {"question": "What's the difference between Git and GitHub?", "type": "single", "options": [{"text": "Git is a distributed version control system (DVCS) that runs locally. GitHub is an interface layer that provides a shared remote.", "correct": true}, {"text": "Git is version control for projects with one contributor. GitHub is version control for projects with multiple contributors.", "correct": false}, {"text": "Git and GitHub are the same.", "correct": false}, {"text": "Git is local version control. GitHub is remote version control.", "correct": false}], "explanation": "Git is the tool you can use to work with a local branch and push changes to a remote repository. GitHub acts as a remote repository.", "course": "foundations", "source": "image16.png"}, {"question": "What is t lled collaboration and access permissions.", "course": "foundations", "source": "image30.jpg"}, {"question": "On your personal GitHub dashboard you received a notification that user octocat has created a new repository octocat/my-repo. Why did you receive that notification?", "type": "single", "options": [{"text": "Because you are following the user octocat", "correct": true}, {"text": "Because you recently visited octocat user profile", "correct": false}, {"text": "Because you contributed to the octocat/my-repo repository", "correct": false}, {"text": "Because you starred the octocat/my-repo repository", "correct": false}], "explanation": null, "course": "foundations", "source": "image31.png"}, {"question": "What is the name of the settings section for changing a project's visibility, deleting a project, or closing a project?", "type": "single", "options": [{"text": "Red Zone", "correct": false}, {"text": "Visibility and Access", "correct": false}, {"text": "Danger Zone", "correct": true}, {"text": "More options", "correct": false}], "explanation": "Each Project contains a \"Danger Zone\" settings area, typically stylized in red, that provides critical configuration options such as visibility, closing, and deleting the project.", "course": "foundations", "source": "image32.jpg"}, {"question": "What happens when you choose to close a Project?", "type": "single", "options": [{"text": "The content is retained and you have the ability to reopen it later.", "correct": true}, {"text": "The project is permanently removed from the platform", "correct": false}, {"text": "The Project is moved to a separate folder", "correct": false}, {"text": "Associated values and insights data are deleted", "correct": false}], "explanation": null, "course": "foundations", "source": "image34.png"}, {"question": "Which of these can make a repository more discoverable?", "type": "multiple", "options": [{"text": "Giving the repository a descriptive name", "correct": true}, {"text": "A well-cra  "correct": false}, {"text": "Close and delete", "correct": true}], "explanation": null, "course": "foundations", "source": "image40.png"}, {"question": "Who should have 2 Factor Authentication enabled on GitHub?", "type": "single", "options": [{"text": "GitHub Organization owners", "correct": false}, {"text": "GitHub Enterprise Server users", "correct": false}, {"text": "All GitHub users", "correct": true}, {"text": "It's not recommended to use 2FA on GitHub for anyone", "correct": false}], "explanation": null, "course": "foundations", "source": "image42.png"}, {"question": "Which advanced search operator combination would you use to find public repositories with more than 100 stars that mention 'docker' in their name?", "type": "single", "options": [{"text": "docker in:description stars:<100 is:public", "correct": false}, {"text": "topic:docker stars:>100 in:readme", "correct": false}, {"text": "in:name docker stars:>100 is:public", "correct": true}, {"text": "is:public name:docker stars:100", "correct": false}], "explanation": null, "course": "foundations", "source": "image43.png"}, {"question": "What are some actions you can do in regards to Repository Templates?", "type": "multiple", "options": [{"text": "Create a new repository from a repository template", "correct": true}, {"text": "Delete all repositories that do not use a repository template provided by your organization", "correct": false}, {"text": "Delete all repositories created from a repository template", "correct": false}, {"text": "Create a repository template from an existing repository", "correct": true}, {"text": "Create an organization from a repository template", "correct": false}], "explanation": null, "course": "foundations", "source": "image44.png"}, {"question": "How do you display certain reserved characters in Markdown, like asterisks (*) and underscores (_)?", "type": "single", "options": [{"text": "Use three in a row, like *** or ___.", "correct": false}, {"text": "Escape them with a ba ": "image49.jpg"}, {"question": "On the GitHub platform how can you stay up to date and notified with a user's public activity?", "type": "single", "options": [{"text": "By following an organization", "correct": false}, {"text": "By following the user", "correct": true}, {"text": "By subscribing to the user's feed", "correct": false}, {"text": "By subscribing to an organization's feed", "correct": false}], "explanation": "Each user has a profile where they can share work publicly. Other users can follow these users to be informed about their latest work.", "course": "foundations", "source": "image50.png"}, {"question": "Which of these can you customize in a Codespaces .devcontainer/devcontainer.json configuration file?", "type": "multiple", "options": [{"text": "Shell configuration", "correct": true}, {"text": "Operating system or base image", "correct": true}, {"text": "GitHub Actions billing usage", "correct": false}, {"text": "Repository branch protection rules", "correct": false}, {"text": "Codespace display name", "correct": true}, {"text": "Organization-level policies", "correct": false}], "explanation": null, "course": "foundations", "source": "image51.png"}, {"question": "In a GitHub Project, what types of views can be created?", "type": "single", "options": [{"text": "Table, Board, Roadmap", "correct": true}, {"text": "Gantt, Kanban, Spreadsheet", "correct": false}, {"text": "Simple List, Tree List, Linked Nodes", "correct": false}, {"text": "Timeline, Calendar, Gantt, Board", "correct": false}], "explanation": "GitHub projects allows creating customized views by combining multiple view types such as Table, Board and Roadmap with filters on your fields.", "course": "foundations", "source": "image53.png"}, {"question": "What is a GitHub Codespace?", "type": "single", "options": [{"text": "A GitHub Codespace is an interactive holographic coding environment that required special hardware to use.", "correct": false}, {"text": "GitHub Codespace is an AI-powered es will be lost. You need to commit them before stopping the Codespace.", "correct": false}], "explanation": null, "course": "foundations", "source": "image58.png"}, {"question": "Which of these actions will make sure that prior to any push to the main branch, the changes have been approved by at least two people?", "type": "multiple", "options": [{"text": "Create a deployment protection rule for main branch", "correct": false}, {"text": "On the branch protection rule, require a pull request before merging", "correct": true}, {"text": "Setup a CODEOWNERS file in the repository", "correct": false}, {"text": "On the branch protection rule, require at least 2 approvals before merging a pull request", "correct": true}, {"text": "On the deployment protection rule, require at least 2 approvals before merging a pull request", "correct": false}, {"text": "Enforce status checks are passing before merging a pull request to the main branch", "correct": false}, {"text": "Create a branch protection rule for main branch", "correct": true}], "explanation": null, "course": "foundations", "source": "image59.png"}, {"question": "What is another name for a version control system?", "type": "single", "options": [{"text": "Version management software (VMS).", "correct": false}, {"text": "Software configuration management (SCM) system.", "correct": true}, {"text": "Software control management (SCM) system.", "correct": false}], "explanation": null, "course": "foundations", "source": "image61.png"}, {"question": "What is the role of an organization security manager?", "type": "single", "options": [{"text": "Security managers are organization members who have complete access to the organization.", "correct": false}, {"text": "Security managers are organization members who, in addition to their permissions as members, are allowed to block and unblock non-member contributors, set interaction limits, and hide comments in public repositories owned by the organization.", "correct": false}, {"text": "Security managers are organization members who can view security alerts and manage settings for code security across your organization, as well as read permissions for all repositories in the organization.", "correct": true}, {"text": "Security managers are organization members who can manage the billing settings for your organization, such as payment information.", "correct": false}], "explanation": null, "course": "foundations", "source": "image62.png"}, {"question": "What are GitHub Gists primarily used for?", "type": "single", "options": [{"text": "Managing public repositories with version control.", "correct": false}, {"text": "Hosting large files for download.", "correct": false}, {"text": "Sharing and collaborating on small code snippets or text notes.", "correct": true}, {"text": "Creating private repositories for personal projects.", "correct": false}], "explanation": "Gists are small pieces of code or markdown-formatted text and typically shared for the purposes of a snippet.", "course": "foundations", "source": "image63.png"}, {"question": "Which statement best describes a major difference between new GitHub Projects and GitHub Projects Classic?", "type": "single", "options": [{"text": "GitHub Projects Classic has a built-in AI that automatically closes pull requests, while the new GitHub Projects do not.", "correct": false}, {"text": "GitHub Projects Classic supports code scanning and secret scanning, while the new GitHub Projects do not.", "correct": false}, {"text": "The new GitHub Projects only allow you to manage open issues without supporting pull requests.", "correct": false}, {"text": "The new GitHub Projects provide a flexible spreadsheet-like interface, custom fields, and two-way issue synchronization that were not available in Projects Classic.", "correct": true}], "explanation": null, "course": "foundations", "source": "image64.png"}, {"question": "Which of these is a repository feature that is used as a community forum to have conversations, ask questions, post announcements and share ideas?", "type": "single", "options": [{"text": "Discussions", "correct": true}, {"text": "Gists", "correct": false}, {"text": "Wikis", "correct": false}, {"text": "Pull requests", "correct": false}], "explanation": null, "course": "foundations", "source": "image65.png"}, {"question": "What are the different permission levels for a repository owned by a personal account?", "type": "multiple", "options": [{"text": "billing manager", "correct": false}, {"text": "repository owner", "correct": true}, {"text": "security manager", "correct": false}, {"text": "collaborator", "correct": true}, {"text": "project owner", "correct": false}], "explanation": null, "course": "foundations", "source": "image66.png"}, {"question": "What are the two types of GitHub Actions?", "type": "single", "options": [{"text": "Container actions and JavaScript actions", "correct": true}, {"text": "Embedded actions and container actions", "correct": false}, {"text": "Workflows and triggers", "correct": false}, {"text": "Events and jobs", "correct": false}], "explanation": "Custom Actions can be created as an embedded Action or a container Action. With container actions, the environment is part of the Action's code. JavaScript actions don't include the environment in the code.", "course": "foundations", "source": "image67.jpg"}, {"question": "What slash command inserts a code block in Markdown?", "type": "single", "options": [{"text": "/markdown", "correct": false}, {"text": "/code", "correct": true}, {"text": "/insertcode", "correct": false}, {"text": "/md", "correct": false}], "explanation": "The /code command is used for adding a code block.", "course": "foundations", "source": "image68.png"}, {"question": "What is the [main difference between] centralized and distributed version control systems?", "type": "single", "options": [{"text": "Centralized systems use a centralized server for code storage, while distributed systems do not require a server.", "correct": true}, {"text": "Centralized systems are faster than distributed systems in handling large projects.", "correct": false}, {"text": "Distributed systems rely on cloud-based storage, while centralized systems use local repositories.", "correct": false}, {"text": "Centralized systems provide stronger security measures compared to distributed systems.", "correct": false}], "explanation": "Centralized version control systems rely on a central server for code storage and collaboration, while distributed systems allow each contributor to have their own local repository and synchronize directly.", "course": "foundations", "source": "image72.jpg"}, {"question": "What are the differences between GitHub Copilot Individual and GitHub Copilot Business?", "type": "single", "options": [{"text": "GitHub Copilot Individual can only be used when working on public repositories and GitHub Copilot Business can be used when working on public and private repositories within an organization", "correct": false}, {"text": "GitHub Copilot Individual is free and GitHub Copilot Business is a paid feature", "correct": false}, {"text": "GitHub Copilot Individual uses an AI model trained on public source code and GitHub Copilot Business uses an AI model trained on private source code", "correct": false}, {"text": "GitHub Copilot Individual can only be used by personal accounts and GitHub Copilot Business is used by organizations and enterprises", "correct": true}], "explanation": null, "course": "foundations", "source": "image73.png"}, {"question": "Which tool helps you keep the repository dependencies up to date?", "type": "single", "options": [{"text": "GitHub Copilot", "correct": false}, {"text": "GitHub Actions", "correct": false}, {"text": "Dependabot", "correct": true}, {"text": "CodeQL", "correct": false}], "explanation": null, "course": "foundations", "source": "image74.png"}, {"question": "What set of settings is included in the \"Securities\" tab for a repository?", "type": "single", "options": [{"text": "Security Advisories, Security Policy, and Code scanning alerts.", "correct": false}, {"text": "GDPR Compliance, Security Advisories, Security Policy, and Code scanning alerts.", "correct": false}, {"text": "Dependabot Alerts, Security Policy, and Code scanning alerts.", "correct": false}, {"text": "Security Advisories, Dependabot Alerts, Security Policy, and Code scanning alerts.", "correct": true}], "explanation": "The Security tab of a repository provides settings for advisories, policies, dependency alerts, and code scanning alerts.", "course": "foundations", "source": "image75.png"}, {"question": "Which statement best describes the difference between cloning a repository and forking a repository?", "type": "single", "options": [{"text": "Forking creates a copy under your GitHub account, while cloning creates a local copy on your computer without linking ownership to your account.", "correct": true}, {"text": "Cloning always transfers repository ownership, while forking does not.", "correct": false}, {"text": "When you clone a repository, changes you push go directly to the original repository. Forking requires a separate local copy.", "correct": false}, {"text": "Only private repositories can be forked, whereas only public repositories can be cloned.", "correct": false}], "explanation": null, "course": "foundations", "source": "image76.png"}, {"question": "Your team has been tracking data of all kinds since your InnerSource program went live three months ago. Which of the following metrics indicates your program is great and improving?", "type": "single", "options": [{"text": "A dramatic rise in pull requests that address bugs in your software.", "correct": true}, {"text": "A growing rate of bug reports that are quickly closed because they cannot be reproduced.", "correct": false}, {"text": "A steady decline in new issues.", "correct": false}, {"text": "Time to open.", "correct": false}], "explanation": "The number of impactful pull requests indicates is definitely useful, and could mean more people are motivated to improve the quality of your software and are making the investment themselves. Be careful [explanation cut off]", "course": "foundations", "source": "image79.jpg"}, {"question": "Which of these statements about GitHub Enterprise deployment options are true?", "type": "multiple", "options": [{"text": "GitHub Enterprise Cloud is a set of advanced functionality on GitHub.com", "correct": true}, {"text": "GitHub Enterprise Cloud is a self-hosted platform that runs on the company's infrastructure", "correct": false}, {"text": "GitHub Enterprise Cloud is a cloud hosted platform that runs on the company's cloud infrastructure", "correct": false}, {"text": "GitHub Enterprise Server is a set of advanced functionality on GitHub.com", "correct": false}, {"text": "GitHub Enterprise Server is a self-hosted platform that runs on the company's infrastructure", "correct": true}], "explanation": null, "course": "foundations", "source": "image81.png"}, {"question": "Which of the GitHub features best serves as a simple way to share small code snippets with others?", "type": "single", "options": [{"text": "Issues", "correct": false}, {"text": "Wikis", "correct": false}, {"text": "Projects", "correct": false}, {"text": "Gists", "correct": true}], "explanation": null, "course": "foundations", "source": "image82.png"}, {"question": "Which of the following Git commands allow you to create a new branch and start working on it in one line?", "type": "multiple", "options": [{"text": "git branch -c <new_branch_name>", "correct": false}, {"text": "git switch -m <new_branch_name>", "correct": false}, {"text": "git checkout -m <new_branch_name>", "correct": false}, {"text": "git switch -c <new_branch_name>", "correct": true}, {"text": "git merge -m <new_branch_name>", "correct": false}, {"text": "git checkout -b <new_branch_name>", "correct": true}], "explanation": null, "course": "foundations", "source": "image83.png"}, {"question": "What steps are required to create a pull request if you only have read access?", "type": "single", "options": [{"text": "Send a patch file to maintainers via email.", "correct": false}, {"text": "Clone a repo, commit changes, and force push.", "correct": false}, {"text": "Get accepted as a team member.", "correct": false}, {"text": "Fork a repo, clone it, commit changes, and push to your fork.", "correct": true}], "explanation": "Unless you are a project contributor, you don't have access to directly push modifications. In this case, fork the repository to create your own copy, then you can make changes and submit a pull request.", "course": "foundations", "source": "image84.png"}, {"question": "What field can you use to create a Priority grouping like High, Medium, and Low in your Project?", "type": "single", "options": [{"text": "Date", "correct": false}, {"text": "Single select", "correct": true}, {"text": "Iteration field", "correct": false}, {"text": "Issue", "correct": false}], "explanation": "The Single select field allows you to create multiple groups like Priority grouping in order to help you organize and prioritize your Project. https://docs.github.com/en/issues/planning-and-tracking-with-projects/understanding-fields/about-single-select-fields", "course": "foundations", "source": "image86.png"}, {"question": "What's the appropriate repository permission role for contributors who need to actively push changes to your repository?", "type": "single", "options": [{"text": "Admin", "correct": false}, {"text": "Write", "correct": true}, {"text": "Triage", "correct": false}, {"text": "Maintain", "correct": false}], "explanation": "The write permission is the appropriate permission level for collaborators that need to create branches, push changes, and create pull requests.", "course": "foundations", "source": "image87.png"}, {"question": "If you face yourself often writing the same set of comments on issues or pull requests, what GitHub feature would you use to save time?", "type": "single", "options": [{"text": "Repository templates", "correct": false}, {"text": "Labels", "correct": false}, {"text": "Comment templates", "correct": false}, {"text": "Saved replies", "correct": true}], "explanation": null, "course": "foundations", "source": "image88.png"}, {"question": "What does an iteration field help you do in Projects?", "type": "single", "options": [{"text": "Allows you to keep track of the various changes made to an issue or pull request.", "correct": false}, {"text": "Allows you to reverse the changes you made to your Project.", "correct": false}, {"text": "Allows you to create sequential phases of your project and group issues and pull requests based on the phase.", "correct": true}, {"text": "Allows you to edit, reiterate, and automate your project as changes are made to issues and pull requests.", "correct": false}], "explanation": "Iteration fields enable organizing issues and pull requests into repeating blocks of time. They are an organizational tool but do not directly impact changes or history.", "course": "foundations", "source": "image89.png"}, {"question": "What is the easiest way to add automation to your Project?", "type": "single", "options": [{"text": "GraphQL API", "correct": false}, {"text": "Built-in Automation", "correct": true}, {"text": "GitHub Actions", "correct": false}, {"text": "GitHub Copilot", "correct": false}], "explanation": "GitHub Projects include built-in automation to allow easily setup of common tasks like adding issues to the project or updating status.", "course": "foundations", "source": "image90.png"}, {"question": "How can you start using GitHub Copilot after activating the GitHub Copilot subscription?", "type": "single", "options": [{"text": "Setup GitHub Copilot in one of the supported IDE's such as Visual Studio Code or JetBrains and start coding", "correct": true}, {"text": "You need to edit the repository settings and enable GitHub Copilot for the repository", "correct": false}, {"text": "You need to setup a GitHub Action that will setup GitHub Copilot on your repository", "correct": false}, {"text": "GitHub Copilot will automatically start giving suggestions on pull requests and issues in your repository", "correct": false}], "explanation": null, "course": "foundations", "source": "image91.png"}, {"question": "Which of these GitHub features serves the purpose of an adaptable spreadsheet, task board and a roadmap that integrates with issues and pull requests on GitHub to plan and track your work effectively?", "type": "single", "options": [{"text": "GitHub Organization", "correct": false}, {"text": "GitHub Repository", "correct": false}, {"text": "GitHub Project", "correct": true}, {"text": "GitHub Copilot", "correct": false}], "explanation": null, "course": "foundations", "source": "image92.png"}, {"question": "Your team is preparing to deploy a new feature using GitHub branches. What should be done to ensure the feature branch is ready for deployment?", "type": "single", "options": [{"text": "Delete the feature branch to finalize the deployment process.", "correct": false}, {"text": "Commit all changes directly to the main branch without review.", "correct": false}, {"text": "Ensure all changes are reviewed and approved through a pull request before merging into the main branch.", "correct": true}], "explanation": null, "course": "foundations", "source": "image93.png"}, {"question": "Where can you disable repository features such as issues, wikis or projects on a repository that you own?", "type": "single", "options": [{"text": "These features cannot be disabled", "correct": false}, {"text": "In the .github/settings.yml configuration file", "correct": false}, {"text": "In your account settings", "correct": false}, {"text": "In the repository settings", "correct": true}], "explanation": null, "course": "foundations", "source": "image94.png"}, {"question": "One of your source projects relies on secrets kept in a folder called .secrets. You would like to make sure that the files kept in this folder on development machines are not inadvertently committed to the repository. Which of these files will best help enforce this policy?", "type": "single", "options": [{"text": "SECURITY.md", "correct": false}, {"text": ".gitignore", "correct": true}, {"text": "CONTRIBUTING.md", "correct": false}, {"text": "README.md", "correct": false}], "explanation": "The .gitignore can be used to help enforce which files are included in commits by tools that respect it. However, note that this policy is enforced by the client and does not necessarily preve...", "course": "foundations", "source": "image95.jpg"}, {"question": "How can you search for specific issues within a GitHub repository?", "type": "single", "options": [{"text": "Use the repository's README.md file to search for issues.", "correct": false}, {"text": "Search for issue titles using the global GitHub search bar.", "correct": true}, {"text": "Manually browse through each issue in the repository.", "correct": false}, {"text": "Open each milestone to find related issues.", "correct": false}], "explanation": "You can use the global GitHub search bar to search for issue titles, labels, and keywords within a specific repository. This is a powerful way to find relevant issues.", "course": "foundations", "source": "image96.png"}, {"question": "What is a \"branch\" in Git?", "type": "single", "options": [{"text": "A specific release version of a project.", "correct": false}, {"text": "A copy of the entire repository on a different server.", "correct": false}, {"text": "A separate timeline of commits for a specific feature or task.", "correct": true}, {"text": "A list of contributors to a repository.", "correct": false}], "explanation": "In Git, a \"branch\" is a separate timeline of commits that allows developers to work on specific features or tasks independently.", "course": "foundations", "source": "image97.png"}, {"question": "What is the purpose of forking a repository?", "type": "single", "options": [{"text": "It creates a duplicate of the upstream repo and allows you to make changes directly to the original repo.", "correct": false}, {"text": "It automatically creates an issue allowing people to see how the original repo can be improved.", "correct": false}, {"text": "Forking lets you make changes to a project without affecting the original repository.", "correct": true}, {"text": "It creates a pull request to show your team what you are changing.", "correct": false}], "explanation": "After you fork a repository, you can fetch updates from the upstream repository to keep your fork up to date, and you can propose changes from your fork to the upstream repository with pull requests. https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/working-with-forks/fork-a-repo", "course": "foundations", "source": "image98.jpg"}, {"question": "What are some supported integrated development environments for GitHub Copilot?", "type": "single", "options": [{"text": "Only Visual Studio Code and Visual Studio", "correct": false}, {"text": "Visual Studio Code, Visual Studio, Xcode, JetBrains, and Neovim", "correct": false}, {"text": "Visual Studio Code, Visual Studio, Spyder, Eclipse", "correct": true}, {"text": "Visual Studio Code, Visual Studio, Jupyter, NetBeans, Notepad++", "correct": false}], "explanation": "GitHub Copilot is supported in many IDEs such as VS Code, Visual Studio, Xcode, JetBrains IDEs, Neovim and even has an SDK for build support for other interfaces. own extensions.", "course": "foundations", "source": "image100.jpg"}, {"question": "How can you link a Pull Request (PR) to a GitHub Issue?", "type": "single", "options": [{"text": "Mention the PR number in the issue description.", "correct": true}, {"text": "Add a comment with the PR link in the issue conversation thread.", "correct": false}, {"text": "Select the related PR in the \"Development\" area.", "correct": false}, {"text": "All of the above.", "correct": false}], "explanation": "Issue and pull request numbers can be mentioned in the description or a comment.", "course": "foundations", "source": "image101.jpg"}, {"question": "Which of these is a common use case for GitHub Actions?", "type": "single", "options": [{"text": "Training machine learning models", "correct": false}, {"text": "Large data processing and analytics", "correct": false}, {"text": "Running automated tests prior to merging a pull request", "correct": true}, {"text": "Adding sponsorship button to your project", "correct": false}], "explanation": null, "course": "foundations", "source": "image104.png"}, {"question": "How do you create a new issue in a GitHub repository?", "type": "single", "options": [{"text": "By sending an email to the repository owner.", "correct": false}, {"text": "By writing a comment on an existing issue.", "correct": false}, {"text": "By clicking the \"New Issue\" button and providing details.", "correct": true}, {"text": "By modifying the \"master\" branch of the repository.", "correct": false}], "explanation": "To create a new issue, you click the \"New Issue\" button within the repository and provide a title, description, and other relevant information.", "course": "foundations", "source": "image105.jpg"}, {"question": "Which of these tools serves as an AI pair programmer that offers autocomplete-style suggestions as you code?", "type": "single", "options": [{"text": "GitHub Partner", "correct": false}, {"text": "GitHub Assistant", "correct": false}, {"text": "GitHub Copilot", "correct": true}, {"text": "GitHub AI Aid", "correct": false}], "explanation": null, "course": "foundations", "source": "image107.png"}, {"question": "Which of these is NOT a role in a GitHub Organization?", "type": "single", "options": [{"text": "Organization member", "correct": false}, {"text": "Billing manager", "correct": false}, {"text": "Outside collaborator", "correct": false}, {"text": "Organization architect", "correct": true}, {"text": "Organization owner", "correct": false}, {"text": "Organization moderator", "correct": false}, {"text": "GitHub App manager", "correct": false}, {"text": "Security manager", "correct": false}], "explanation": null, "course": "foundations", "source": "image112.png"}, {"question": "As an organization owner, you want to ensure that everyone who is signed in to your corporate network can access the GitHub website without requiring a additional credentials. Which technology would you enable to accomplish this?", "type": "single", "options": [{"text": "Single sign-on", "correct": true}, {"text": "Two-factor authentication", "correct": false}, {"text": "Personal Access Tokens", "correct": false}, {"text": "SSH keys", "correct": false}], "explanation": "Single sign-on is the right technology to allow network users to access the GitHub website without extra credentials.", "course": "foundations", "source": "image114.jpg"}, {"question": "You would like to include an HTML snippet to your GitHub Page but Markdown doesn't offer a way to render it. What should you do?", "type": "single", "options": [{"text": "Just add the HTML inline.", "correct": true}, {"text": "Cut the content. If it's not supported in Markdown, then it's probably not worth including.", "correct": false}, {"text": "Open an issue that requests Markdown support for your very specialized scenario.", "correct": false}, {"text": "Implement a separate md file in the same branch and link it to your original content.", "correct": false}], "explanation": "Markdown is not a complete replacement for HTML, so it's understood that you may need to add HTML in to get the desired results. There are however different Markdown renders and there are sometimes limitations.", "course": "foundations", "source": "image115.jpg"}, {"question": "What is the GitHub Flow?", "type": "single", "options": [{"text": "It refers to a one branch workflow where developers work on their features on the master branch, and then get their feature code reviewed, tested, and committed.", "correct": false}, {"text": "It's a practice where every time a commit is pushed to the main branch, a new release is automatically created and deployed.", "correct": false}, {"text": "It refers to a branch-based workflow where developers create a branch for each new change they're working on, and then open pull requests to get their code reviewed, tested, and merged into the main branch.", "correct": true}, {"text": "It's a practice where every time a commit is pushed to the main branch, a set of CI/CD pipelines are triggered to run tests and validate the code changes.", "correct": false}], "explanation": null, "course": "foundations", "source": "image116.png"}, {"question": "Which of the below is a valid way to prompt GitHub Copilot for a suggestion in the IDE?", "type": "single", "options": [{"text": "Type a code comment or text in a markdown file. Wait for a suggestion to appear. Press the ‘Tab’ key to accept the suggestion.", "correct": true}, {"text": "Navigate to github.com, select the Copilot Chat window and enter a question.", "correct": false}, {"text": "Highlight the code with your mouse. Open the command palette, select the ‘GitHub Copilot’ option, and enter your prompt into the chat box.", "correct": false}, {"text": "Copilot cannot be prompted for suggestions. It automatically provides suggestions.", "correct": false}], "explanation": "Copilot uses several context areas for prompting for a suggestion. One of them is pauses in code editing activity in the IDE. There are also options for inline chat and in a side chat panel. https://docs.github.com/en/copilot/using", "course": "foundations", "source": "image119.jpg"}, {"question": "What are the different levels of GitHub organizational hierarchy?", "type": "multiple", "options": [{"text": "Organization level", "correct": true}, {"text": "Team level", "correct": true}, {"text": "Enterprise level", "correct": true}, {"text": "Pro level", "correct": false}, {"text": "Personal level", "correct": false}], "explanation": null, "course": "foundations", "source": "image120.png"}, {"question": "How can you define guiding protocols for users intending to submit bug reports or propose new features in your repository so they know what information to fill-in?", "type": "single", "options": [{"text": "Add labels to issues that they create", "correct": false}, {"text": "Set up GitHub Projects", "correct": false}, {"text": "Create issue templates", "correct": true}, {"text": "Have an example issue in the repository that is easy to copy and is never closed", "correct": false}], "explanation": null, "course": "foundations", "source": "image122.png"}, {"question": "When should a GitHub issue be used instead of a discussion?", "type": "single", "options": [{"text": "When seeking open-ended feedback on a project idea.", "correct": false}, {"text": "When tracking specific tasks or bugs related to a project.", "correct": true}, {"text": "When announcing project milestones to the team.", "correct": false}], "explanation": null, "course": "foundations", "source": "image123.png"}, {"question": "Is GitHub Copilot free to use?", "type": "single", "options": [{"text": "Yes, GitHub Copilot Free is available for all personal GitHub accounts with limited usage", "correct": true}, {"text": "No, it requires a paid subscription", "correct": false}, {"text": "Yes, but only for students, teachers, and open source maintainers", "correct": false}, {"text": "Yes, but only for individuals working on public repositories", "correct": false}], "explanation": "GitHub Copilot Free is available to all personal GitHub accounts, providing limited code completions and chat interactions per month.", "course": "foundations", "source": "image125.png"}, {"question": "Which GitHub Project layout would best serve as a Kanban board?", "type": "single", "options": [{"text": "Table layout", "correct": false}, {"text": "Agile layout", "correct" s, maps, and 3D models to a wiki.", "correct": false}, {"text": "Wikis in public repositories are accessible to anyone, while those in private repositories are only accessible to repository collaborators.", "correct": true}], "explanation": null, "course": "foundations", "source": "image142.png"}, {"question": "What are GitHub's slash commands?", "type": "single", "options": [{"text": "It's a way of automating GitHub Actions.", "correct": false}, {"text": "It's a way to quickly insert complex Markdown into your pull request or issue comments and descriptions.", "correct": true}, {"text": "It's an another name for the GitHub CLI.", "correct": false}, {"text": "It's a way to quickly fix code formatting issues in your pull request's code changes.", "correct": false}], "explanation": null, "course": "foundations", "source": "image143.png"}, {"question": "How can you enforce status checks passing before merging a pull request to the main branch?", "type": "single", "options": [{"text": "By running tests locally prior to pushing to the remote repository", "correct": false}, {"text": "By using GitHub Actions", "correct": false}, {"text": "By making the repository private", "correct": false}, {"text": "By creating a branch protection rule", "correct": true}], "explanation": null, "course": "foundations", "source": "image144.png"}, {"question": "What are GitHub teams?", "type": "single", "options": [{"text": "It's a way of managing access to personal GitHub repositories to many users at once.", "correct": false}, {"text": "It's a group of GitHub users from the same organization.", "correct": true}, {"text": "It's a version of Microsoft Teams for GitHub.", "correct": false}], "explanation": null, "course": "foundations", "source": "image145.png"}, {"question": "Which of the following statements accurately describes GitHub Pages?", "type": "single", "options": [{"text": "It is a feature exclusively available to GitHub Enterprise users.", "correct": false}, {"text": "GitHub Pages supports dynamic server-side scripting and databases.", "correct": false}, {"text": "GitHub Pages allows users to host and publish static websites directly from GitHub repositories.", "correct": true}, {"text": "GitHub Pages provides unlimited free hosting of all types of web applications.", "correct": false}], "explanation": "GitHub Pages is a service that allows any user to create and host static websites directly from their GitHub repositories, making it easy to share information, project documentation, and more.", "course": "foundations", "source": "image146.png"}, {"question": "Your team has been receiving some low-quality bug reports without enough information to properly diagnose. Which of the following choices is the best way to address the issue?", "type": "single", "options": [{"text": "Use GitHub Script to add a workflow action that automatically rejects any issues with a description fewer than 200 characters long.", "correct": false}, {"text": "Add an ISSUE_TEMPLATE.md file that includes fields for reproduction steps, system properties, and instructions for generating and including important logs.", "correct": true}, {"text": "Add a CONTRIBUTING.md file that clearly explains what's expected in bug reports, such as reproduction steps, system properties, and instructions for generating and including important logs.", "correct": false}, {"text": "Add a issues.md file that clearly explains what's expected in bug reports, such as reproduction steps, system properties, and instructions for generating and including important logs.", "correct": false}], "explanation": "An action may ensure length but doesn't necessarily mean that your team will receive the desired the information to diagnose and fix bugs.", "course": "foundations", "source": "image147.png"}, {"question": "What is the purpose of a CODEOWNERS file?", "type": "single", "options": [{"text": "The CODEOWNERS file contains information about the software licensing fees and conditions under which the  a link to the most recent GitHub Codespace that was created for the repository", "correct": false}], "explanation": null, "course": "foundations", "source": "image157.png"}, {"question": "How does the synchronization between GitHub projects, issues and pull requests work?", "type": "single", "options": [{"text": "Information synchronization only works in one direction - from project to issues and pull requests. Updates to issues and pull requests won't be automatically mirrored in GitHub Project items.", "correct": false}, {"text": "Updates to the issues and pull requests will not be automatically reflected in GitHub Projects, it has to be triggered manually by the user.", "correct": false}, {"text": "Information synchronization only works in one direction - from issues and pull requests to projects. Updates to Project items won't be automatically mirrored in issues and pull requests.", "correct": false}, {"text": "Updates to the issues and pull requests will be automatically reflected in GitHub Projects. This integration works both ways, so that when you change information about a pull request or issue in your project, the pull request or issue reflects that information.", "correct": true}], "explanation": null, "course": "foundations", "source": "image159.png"}, {"question": "How do you create a GitHub Milestone for tracking project progress?", "type": "single", "options": [{"text": "By creating a new branch and adding a milestone label.", "correct": false}, {"text": "By approving a release label associated with a pull request.", "correct": false}, {"text": "By creating a new release of the project.", "correct": false}, {"text": "By going to the \"Issues\" tab and selecting \"Milestones,\" then clicking \"New Milestone.\"", "correct": true}], "explanation": "To create a GitHub Milestone, you navigate to the \"Issues\" tab of the repository, select \"Milestones,\" and then click \"New Milestone.\" This allows you to set a title, description, due date, and associate issues and pull requests with the Milestone for tracking progress.", "course": "foundations", "source": "image161.png"}, {"question": "What is the role of an organization moderator?", "type": "single", "options": [{"text": "Moderators are organization members who, in addition to their permissions as members, are allowed to block and unblock non-member contributors, set interaction limits, and hide comments in public repositories owned by the organization.", "correct": true}, {"text": "Moderators are organization members who have complete access to the organization.", "correct": false}, {"text": "Moderators are organization members who can manage the billing settings for your organization, such as payment information.", "correct": false}, {"text": "Moderators are organization members who can view security alerts and manage settings for code security across your organization, as well as read permissions for all repositories in the organization.", "correct": false}], "explanation": null, "course": "foundations", "source": "image166.png"}, {"question": "What does a \"Pull Request\" (PR) in GitHub refer to?", "type": "single", "options": [{"text": "A request to delete a repository permanently.", "correct": false}, {"text": "A request to merge changes from one branch into another.", "correct": true}, {"text": "A request for adding a new developer to the project.", "correct": false}, {"text": "A request to download the latest version of a repository.", "correct": false}], "explanation": "A \"Pull Request\" (PR) is a process collect peer feedback and to merge changes made in one branch, usually a feature branch, into another branch, usually the main or default branch.", "course": "foundations", "source": "image167.jpg"}, {"question": "Who are repository collaborators?", "type": "single", "options": [{"text": "Collaborators are people who have raised issues or pull requests on a repository.", "correct": false}, {"text": "Collaborators are people who have been granted write
