ent, teacher, or maintainer of a popular open source project", "correct": true}, {"text": "Yes, but only for individuals working on public repositories", "correct": false}, {"text": "No", "correct": false}, {"text": "Yes", "correct": false}], "explanation": null, "course": "foundations", "source": "p006.png"}, {"question": "Which of these features is unique to GitHub Enterprise Cloud (GHEC)?", "type": "single", "options": [{"text": "Requires on-premises deployment and infrastructure management", "correct": false}, {"text": "Provides centralized user management with identity provider integration", "correct": true}, {"text": "Must be installed and maintained by the organization's IT team", "correct": false}, {"text": "Operates entirely within a private cloud environment", "correct": false}], "explanation": null, "course": "foundations", "source": "p007.png"}, {"question": "What actions can you take at enterprise level to manage the use of GitHub Actions in your enterprise instance?", "type": "single", "options": [{"text": "Create workflow templates", "correct": false}, {"text": "Configure a GitHub Actions use policy", "correct": true}, {"text": "Manually sync public actions in Enterprise Cloud", "correct": false}], "explanation": null, "course": "foundations", "source": "p008.png"}, {"question": "What can you do with GitHub Discussions?", "type": "single", "options": [{"text": "create a repository branch", "correct": false}, {"text": "create a pull request", "correct": false}, {"text": "create a repository", "correct": false}, {"text": "create an issue out of it", "correct": true}], "explanation": null, "course": "foundations", "source": "p009.png"}, {"question": "Where can you go to enable default workflows for a Project?", "type": "single", "options": [{"text": "In the Project's README editor", "correct": false}, {"text": "From the three-dot menu in the top-right of your Project", "correct": true}, {"text": "Under repository settings", "correct": false}], "explanation": null, "course": "foundations", "source": "p012.png"}, {"question": "What is the GitHub Sponsors program?", "type": "single", "options": [{"text": "A group of companies that fund GitHub", "correct": false}, {"text": "A program that helps people find a job", "correct": false}, {"text": "A program where highly skilled developers volunteer to help students", "correct": false}, {"text": "A way to financially support the developers of the open source projects", "correct": true}], "explanation": null, "course": "foundations", "source": "p014.png"}, {"question": "Chris Griffin works for an organization and wants to build a centralized website for the organization. Which type of GitHub Pages site should Chris create for the organization's centralized website?", "type": "single", "options": [{"text": "User site", "correct": false}, {"text": "Repository site", "correct": false}, {"text": "Organization site", "correct": true}, {"text": "Project site", "correct": false}], "explanation": null, "course": "foundations", "source": "p015.png"}, {"question": "What is the difference between GitHub Copilot Business and GitHub Copilot Enterprise?", "type": "single", "options": [{"text": "GitHub Copilot Business provides code completions", "correct": false}, {"text": "GitHub Copilot Business provides chat in the IDE and mobile", "correct": false}, {"text": "GitHub Copilot Enterprise provides an extra layer of personalization; organizations use their own codebase to train GitHub Copilot", "correct": true}, {"text": "GitHub Copilot Enterprise provides an extra layer of security with IP indemnity", "correct": false}], "explanation": null, "course": "foundations", "source": "p017.png"}, {"question": "Which plan includes all Pro features plus additional premium usage and priority infrastructure access?", "type": "single", "options": [{"text": "GitHub Copilot Free", "correct": false}, {"text": "GitHub Copilot Pro", "correct": false}, {"text": "GitHub Copilot Pro+", "correct": true}, {"text": "GitHub Copilot Enterprise", "correct": false}], "explanation": null, "course": "foundations", "source": "p017.png"}, {"question": "What is a GitHub Pro plan?", "type": "single", "options": [{"text": "A certification path", "correct": false}, {"text": "A paid plan for enterprises to self-host", "correct": false}, {"text": "A paid plan for personal accounts that offers additional features in addition to the free plan", "correct": true}, {"text": "A paid plan for organizations", "correct": false}], "explanation": null, "course": "foundations", "source": "p018.png"}, {"question": "What is the maximum number of members allowed in a GitHub team when using team synchronization?", "type": "single", "options": [{"text": "Unlimited", "correct": false}, {"text": "5000", "correct": true}, {"text": "10000", "correct": false}, {"text": "1500", "correct": false}], "explanation": "When using team synchronization there are specific usage limits. The maximum number of members in a GitHub team is 5,000.", "course": "foundations", "source": "p019.png"}, {"question": "How can you ensure that your favorite discussion stays at the top?", "type": "single", "options": [{"text": "Follow it.", "correct": false}, {"text": "Comment on it.", "correct": false}, {"text": "Save it.", "correct": false}, {"text": "Pin it.", "correct": true}, {"text": "Star it.", "correct": false}, {"text": "Subscribe to it.", "correct": false}], "explanation": null, "course": "foundations", "source": "p021.png"}, {"question": "What advantages do GitHub issue forms offer? Choose TWO correct answers.", "type": "multiple", "options": [{"text": "Limit the number of issues that can be opened.", "correct": false}, {"text": "People can be automatically assigned to issues created.", "correct": true}, {"text": "Restrict access to certain users.", "correct": false}, {"text": "Labels can be automatically added to issues created.", "correct": true}, {"text": "Automatically close issues after a certain period of time.", "correct": false}], "explanation": "With issue forms, you can optionally add assignees and labels that will be automatically applied to issues created with the template.", "course": "foundations", "source": "p023.png"}, {"question": "You notice that your pull request has passed all status checks but still cannot be merged. What might be a reason for this?", "type": "single", "options": [{"text": "The pull request is still in draft status", "correct": false}, {"text": "The base branch has a conflict", "correct": false}, {"text": "The pull request does not have the required number of approving reviews", "correct": true}], "explanation": null, "course": "foundations", "source": "p024.png"}, {"question": "Which pull request status indicates that the proposed changes have been successfully integrated into the base branch?", "type": "single", "options": [{"text": "Merged", "correct": true}, {"text": "Open", "correct": false}, {"text": "Draft", "correct": false}], "explanation": null, "course": "foundations", "source": "p024.png"}, {"question": "What are Enterprise Managed Users?", "type": "single", "options": [{"text": "It's a GitHub Enterprise support user account that can be used to manage your Enterprise by GitHub Support once requested.", "correct": false}, {"text": "It's a shared user account that can be used by multiple users in your Enterprise.", "correct": false}, {"text": "It's a GitHub Enterprise feature that allows you to manage user access from an external identity provider such as Azure AD or Okta.", "correct": true}, {"text": "It's a user account without access to the GitHub web UI that is only used for automation tasks in your GitHub Enterprise.", "correct": false}], "explanation": null, "course": "foundations", "source": "p025.png"}, {"question": "What's the difference between Git and GitHub?", "type": "single", "options": [{"text": "Git lets you work with one or more local branches and push changes to a remote repository. GitHub acts as the remote repository, which is accessed through a website or command-line tools.", "correct": true}, {"text": "Git is a distributed version control system (DVCS) that runs in the cloud. GitHub is an interface layer that provides access to Git technology.", "correct": false}, {"text": "Git is used by an individual contributor. GitHub is used by multiple contributors to simplify group development work.", "correct": false}], "explanation": null, "course": "foundations", "source": "p026.png"}, {"question": "What is a benefit of assigning a milestone to issues or pull requests?", "type": "single", "options": [{"text": "It prevents other users from editing the issue or pull request.", "correct": false}, {"text": "It helps track progress toward a shared goal, such as a release.", "correct": true}, {"text": "It sends email notifications to the entire repository.", "correct": false}], "explanation": null, "course": "foundations", "source": "p027.png"}, {"question": "Which query shows all open issues labeled as bugs in a specific milestone?", "type": "single", "options": [{"text": "is:open is:issue label:bug milestone:\"Sprint 1\"", "correct": true}, {"text": "Label: bug milestone: closed", "correct": false}, {"text": "Is: pr label: bug", "correct": false}], "explanation": null, "course": "foundations", "source": "p027.png"}, {"question": "How do you insert a saved reply in an issue or pull request comment?", "type": "single", "options": [{"text": "Click the saved reply icon in the comment field and select from your saved replies.", "correct": true}, {"text": "Type @saved and select from the reply dropdown.", "correct": false}, {"text": "Use the slash command /reply to open your saved replies.", "correct": false}], "explanation": null, "course": "foundations", "source": "p027.png"}, {"question": "What does assigning someone to an issue or pull request indicate?", "type": "single", "options": [{"text": "That person is responsible for working on it.", "correct": true}, {"text": "That person is the original author.", "correct": false}, {"text": "That person will automatically receive a badge.", "correct": false}], "explanation": null, "course": "foundations", "source": "p027.png"}, {"question": "How does GitHub Copilot work?", "type": "single", "options": [{"text": "GitHub Copilot uses prompts and natural language text that you type to provide coding suggestions.", "correct": true}, {"text": "GitHub Copilot uses highlights, that you select, and it provides suggestions based on what you highlight.", "correct": false}, {"text": "GitHub Copilot uses radio language, that you type, and it provides suggestions based on what you type.", "correct": false}], "explanation": null, "course": "foundations", "source": "p028.png"}, {"question": "What are some GitHub Copilot Free features?", "type": "single", "options": [{"text": "It's a free unrestricted AI tool that works independent of code editors.", "correct": false}, {"text": "It provides several suggestions and chats per month directly in your IDE and on github.com.", "correct": true}, {"text": "An option to enable slower responses, preserving your Copilot Pro quota.", "correct": false}], "explanation": null, "course": "foundations", "source": "p028.png"}, {"question": "How can you accept GitHub Copilot's suggestions?", "type": "single", "options": [{"text": "Press the Tab key.", "correct": true}, {"text": "Press the F1 key.", "correct": false}, {"text": "Press the F4 key.", "correct": false}], "explanation": null, "course": "foundations", "source": "p028.png"}, {"question": "Where can a repository admin view insights for a repository?", "type": "single", "options": [{"text": "In the \"Issues\" tab.", "correct": false}, {"text": "In the \"Insights\" tab.", "correct": true}, {"text": "In the repository settings page.", "correct": false}, {"text": "In the \"Actions\" tab.", "correct": false}], "explanation": "A repository admin can view insights for a repository in the \"Insights\" tab, located at the top of the repository's page on GitHub.", "course": "foundations", "source": "p029.png"}, {"question": "What label does a maintainer use to indicate that they require assistance with an issue or pull request?", "type": "single", "options": [{"text": "help wanted", "correct": true}, {"text": "assistance", "correct": false}, {"text": "urgent", "correct": false}, {"text": "priority", "correct": false}], "explanation": "A maintainer can use the \"help wanted\" label if they need assistance with a specific issue or pull request.", "course": "foundations", "source": "p030.png"}, {"question": "A developer mistakenly closed a pull request without merging it. What is the appropriate action to take to proceed with the changes?", "type": "single", "options": [{"text": "Reopen the pull request and proceed with the merge.", "correct": true}, {"text": "Abandon the changes and inform the team of the closure.", "correct": false}, {"text": "Create a new branch with the same changes and open a new pull request.", "correct": false}], "explanation": null, "course": "foundations", "source": "p031.png"}, {"question": "Your team prefers a concise commit history but wants to retain the context of individual commits. Which merging strategy should you use?", "type": "single", "options": [{"text": "Rebase and merge", "correct": false}, {"text": "Squash and merge", "correct": true}, {"text": "Merge commit", "correct": false}], "explanation": null, "course": "foundations", "source": "p031.png"}, {"question": "If you encounter a pull request with a 'merged' status, what does it signify about the state of the branch changes?", "type": "single", "options": [{"text": "The branch changes have been successfully integrated into the base branch and the pull request is complete.", "correct": true}, {"text": "The branch changes are still pending review and approval.", "correct": false}, {"text": "The branch changes were rejected and the pull request was closed without merging.", "correct": false}], "explanation": null, "course": "foundations", "source": "p031.png"}, {"question": "When code scanning is enabled, what is one default event that triggers a scan?", "type": "single", "options": [{"text": "Creating a new branch.", "correct": false}, {"text": "Pushing a change.", "correct": true}, {"text": "Deleting a branch.", "correct": false}], "explanation": null, "course": "foundations", "source": "p033.png"}, {"question": "Which of the following are the tools used to upload a SARIF file?", "type": "single", "options": [{"text": "The tools used are GitHub Actions, the code scanning API, and the CodeQL CLI.", "correct": true}, {"text": "The tools used are GitHub Actions, the ESLint analysis tool, the code scanning API, and the CodeQL CLI.", "correct": false}, {"text": "The tools used are the partialFingerprints property, GitHub Actions, the code scanning API, and the CodeQL CLI.", "correct": false}], "explanation": null, "course": "foundations", "source": "p033.png"}, {"question": "What is the difference between scheduled versus triggered events in code scanning?", "type": "single", "options": [{"text": "Scheduled events are more difficult to configure than triggered events.", "correct": false}, {"text": "Scheduled events run based on a specified schedule and triggered events run on code events such as a push.", "correct": true}, {"text": "Triggered events run less frequently than scheduled events.", "correct": false}], "explanation": null, "course": "foundations", "source": "p033.png"}, {"question": "Identify which statement is valid and select the correct answer:", "type": "single", "options": [{"text": "A prompt, which is our output, is a collection of songs that tells our copilot what to generate.", "correct": false}, {"text": "A prompt, which is our input, is a collection of instructions or guidelines that tell our copilot what to generate.", "correct": true}, {"text": "A prompt, which is our document, is a collection of laptops that tells our Copilot what to generate.", "correct": false}], "explanation": null, "course": "foundations", "source": "p034.png"}, {"question": "What does the quality of the output from GitHub Copilot depend on?", "type": "single", "options": [{"text": "Your code editor.", "correct": false}, {"text": "How well your extensions were installed.", "correct": false}, {"text": "How well you craft your prompt.", "correct": true}], "explanation": null, "course": "foundations", "source": "p034.png"}, {"question": "Stewie is working on a software project hosted on GitHub and wants to share a specific line of code from a file in the project with his colleague, Meg. However, Stewie wants to ensure that the link he shares remains valid even if changes are made to the file in the future. Which of the following options should Stewie use to create a link to the specific line of code?", "type": "single", "options": [{"text": "Stewie should copy the URL from the \"Share\" button next to the line of code and share it with Meg.", "correct": false}, {"text": "Stewie should copy the URL from the browser's address bar when viewing the file and share it with Meg.", "correct": false}, {"text": "Stewie should use the \"Permalink\" option provided by GitHub to create a permanent link and share it with Meg.", "correct": true}, {"text": "Stewie should download the file, extract the specific line of code, and email it to Meg.", "correct": false}], "explanation": "GitHub provides the option to create a permanent link (permalink) to a specific line or range of lines of code in a file or pull request. This permalink ensures the shared link remains valid even if changes are made to the file in the future.", "course": "foundations", "source": "p035.png"}, {"question": "What are the differences between organization members and external collaborators in GitHub?", "type": "single", "options": [{"text": "External collaborators do not require two-factor authentication to collaborate on a repository.", "correct": false}, {"text": "External collaborators can @mention any visible team.", "correct": false}, {"text": "Once added, external collaborators can see all organization members and teams.", "correct": false}, {"text": "External collaborators cannot be team maintainers.", "correct": true}], "explanation": "Outside collaborators cannot be added to a team; team membership is restricted to members of the organization. An external/outside collaborator cannot create teams, see all organization members and teams, @mention any visible team, or be a team maintainer.", "course": "foundations", "source": "p036.png"}, {"question": "What is the benefit of converting checklist items into sub-issues?", "type": "single", "options": [{"text": "It allows you to embed a checklist within an issue.", "correct": false}, {"text": "It turns checklist items into standalone issues with status and metadata.", "correct": true}, {"text": "It automatically resolves the parent issue.", "correct": false}], "explanation": null, "course": "foundations", "source": "p037.png"}, {"question": "What is a security policy in GitHub?", "type": "single", "options": [{"text": "Define guidelines for reporting security vulnerabilities.", "correct": true}, {"text": "A scanner that identifies security vulnerabilities and errors in code on GitHub.", "correct": false}, {"text": "Advanced Security settings for Organizations.", "correct": false}, {"text": "View or disclose security advisories.", "correct": false}, {"text": "Policy for configuring notifications when any dependencies have vulnerabilities.", "correct": false}], "explanation": "To give people instructions for reporting security vulnerabilities in your project, you can add a SECURITY.md file to your repository's root, docs, or .github folder. When someone creates an issue in your repository, they will see a link to your project's security policy.", "course": "foundations", "source": "p038.png"}, {"question": "What is the purpose of github.dev?", "type": "single", "options": [{"text": "A lightweight web-based editor", "correct": true}, {"text": "A cloud-based development environment", "correct": false}, {"text": "An integrated terminal for GitHub", "correct": false}, {"text": "A visual Git client", "correct": false}], "explanation": "The github.dev is an online web-based editor that allows you to quickly open or create files within a repository. It's a lightweight alternative to desktop editors and is similar to Visual Studio Code.", "course": "foundations", "source": "p039.png"}, {"question": "Peter wants to update his GitHub profile settings to decide whether to publicize his private contributions. He wants to understand the implications of this choice before making a decision. What happens when he chooses to publicize his private contributions on his GitHub profile?", "type": "single", "options": [{"text": "Visitors to your profile can see detailed information about your private contributions.", "correct": false}, {"text": "Visitors can only see your public contributions.", "correct": false}, {"text": "Visitors can see the number of private contributions without further details.", "correct": true}, {"text": "Visitors cannot see any contributions on your profile.", "correct": false}], "explanation": "When someone visits his profile, they can see that he made private contributions on certain days, but they won't be able to view the specific details of those contributions.", "course": "foundations", "source": "p040.png"}, {"question": "Which of the following capabilities are available in GitHub Copilot Business but not available in individual Copilot plans?", "type": "multiple", "options": [{"text": "Organization-wide policy controls (e.g., enable/disable features for all users)", "correct": true}, {"text": "AI code completions and Copilot Chat in supported IDEs", "correct": false}, {"text": "Integration with enterprise compliance and audit requirements", "correct": false}, {"text": "Centralized billing and seat management for an organization", "correct": true}, {"text": "Access for verified students and teachers at no cost", "correct": false}], "explanation": "Copilot Business adds organization-wide policy controls and centralized billing and seat management for organizations. AI completions and Copilot Chat are available in all plans.", "course": "foundations", "source": "p041.png"}, {"question": "After selecting the feature branch, what is the next step in creating a pull request on GitHub?", "type": "single", "options": [{"text": "Delete the feature branch after selecting it.", "correct": false}, {"text": "Select the 'Compare & pull request' button above the list of files.", "correct": true}, {"text": "Directly edit files in the main branch to reflect the changes.", "correct": false}], "explanation": null, "course": "foundations", "source": "p042.png"}, {"question": "A team member attempted to merge a pull request but encountered a failed status check. What action should be taken to resolve this?", "type": "single", "options": [{"text": "Ignore the failed status check and proceed with the merge.", "correct": false}, {"text": "Request a review from an additional team member to bypass the failed status check.", "correct": false}, {"text": "Investigate the cause of the failed status check and make necessary corrections.", "correct": true}], "explanation": null, "course": "foundations", "source": "p042.png"}, {"question": "Which of these statements about `saved replies` are true? (Choose two.)", "type": "multiple", "options": [{"text": "You can create, edit and delete them in your GitHub account settings in the `Saved replies` section.", "correct": true}, {"text": "Saved replies are comments that you can reuse in issues and pull requests.", "correct": true}, {"text": "Saved replies are only available to repository owners which can setup automated replies to issues and pull requests.", "correct": false}, {"text": "When someone comments on your issue or pull request, you can save their reply and set a notification to remind yourself about responding to it later.", "correct": false}], "explanation": null, "course": "foundations", "source": "p043.png"}, {"question": "GitHub Action workflows are triggered by events. Which of these are valid events that GitHub Actions support? (Choose two.)", "type": "multiple", "options": [{"text": "A pull request is opened", "correct": true}, {"text": "A commit is pushed to a branch", "correct": true}, {"text": "A new vulnerability has been detected in a dependency", "correct": false}, {"text": "A change is made to the repository settings", "correct": false}], "explanation": null, "course": "foundations", "source": "p044.png"}, {"question": "How does GitHub's top-level search bar differ from the search options available on repository tabs?", "type": "single", "options": [{"text": "Other than being located in different parts of the user interface, they're otherwise the same.", "correct": false}, {"text": "They support different filter syntax options.", "correct": false}, {"text": "The top-level search bar supports searching everything across all of GitHub, whereas the repository tab searches are scoped to cover specific types in the current repository.", "correct": true}], "explanation": null, "course": "foundations", "source": "p046.png"}, {"question": "Lois, a project manager, wants to get a quick summary of her team's recent activity on a GitHub repository. She needs to see information about open and merged pull requests, open and closed issues, and commit activity. Which repository insight should she use?", "type": "single", "options": [{"text": "Pulse", "correct": true}, {"text": "Code frequency", "correct": false}, {"text": "Contributors", "correct": false}, {"text": "Network", "correct": false}], "explanation": "Pulse provides an overview of a repository's activity, including open and merged pull requests, open and closed issues, and a graph showing the commit activity for the top 15 users who committed to the default branch of the project in the selected time period.", "course": "foundations", "source": "p047.png"}, {"question": "Suppose a bug issue is reported on your project, and you know which pull request introduced the problem. Which of the following options is not a cross-linking best practice?", "type": "single", "options": [{"text": "Don't create cross-links when the root cause of the issue is already known.", "correct": true}, {"text": "Add a comment to the bug report that includes the pull request's author by using an @mention.", "correct": false}, {"text": "Add a comment to the bug report that links the pull request to it using the #ID syntax.", "correct": false}], "explanation": null, "course": "foundations", "source": "p049.png"}, {"question": "What does `git blame` do?", "type": "single", "options": [{"text": "It creates a bug assigned to the last person who committed changes to the specified file.", "correct": false}, {"text": "It displays the commit history of the file.", "correct": true}, {"text": "It reverts the effects of a `git praise` command.", "correct": false}], "explanation": null, "course": "foundations", "source": "p051.png"}, {"question": "What is GitHub Copilot?", "type": "single", "options": [{"text": "GitHub Copilot is an AI pair programmer that you can use to get code suggestions.", "correct": true}, {"text": "GitHub Copilot is OpenAI Codex, a new AI system that OpenAI created.", "correct": false}, {"text": "GitHub Copilot is a JavaScript public repository and is one of the best-supported languages.", "correct": false}, {"text": "GitHub Copilot can write a comment that describes logic, and you can add your suggested code to implement the solution.", "correct": false}], "explanation": null, "course": "foundations", "source": "p052.png"}, {"question": "What are the supported IDE extensions for GitHub Copilot?", "type": "single", "options": [{"text": "VS Code and Visual Studio", "correct": false}, {"text": "GitHub.com, VS Code, Visual Studio, Neovim, and JetBrains", "correct": false}, { ited from parent directories", "correct": true}], "explanation": "In Git repositories, settings from .gitignore files are inherited from parent directories to child directories, meaning that settings defined in parent directories are applicable to child directories unless overridden by a .gitignore file in the child directory.", "course": "foundations", "source": "p055.png"}, {"question": "Who can create a repository template on GitHub?", "type": "single", "options": [{"text": "Anyone with read permissions to a repository.", "correct": false}, {"text": "Anyone with write permissions to a repository.", "correct": false}, {"text": "Anyone with admin permissions to a repository.", "correct": true}, {"text": "Only organization owners.", "correct": false}, {"text": "Only users with a GitHub Pro or GitHub Team subscription.", "correct": false}], "explanation": "Anyone with admin permissions to a repository can make the repository a template. After you make your repository a template, anyone with access to the repository can generate a new repository with the same directory structure and files as your default branch.", "course": "foundations", "source": "p056.png"}, {"question": "What is a key feature available in GitHub Enterprise but not in GitHub Team?", "type": "single", "options": [{"text": "GitHub Packages", "correct": false}, {"text": "GitHub Connect", "correct": false}, {"text": "GitHub Actions", "correct": false}, {"text": "GitHub Enterprise Support", "correct": true}], "explanation": "GitHub Enterprise includes additional features like GitHub Enterprise Support that are not available in GitHub Team.", "course": "foundations", "source": "p057.png"}, {"question": "What Project descriptor automatically saves when you change it?", "type": "single", "options": [{"text": "Project name", "correct": true}, {"text": "Project description", "correct": false}, {"text": "Project README", "correct": false}], "explanation": null, "course": "foundations", "source": "p058.png"}, ered by the Claude system", "correct": false}, {"text": "Meta, powered by the Llama system", "correct": false}], "explanation": "Microsoft developed GitHub Copilot in collaboration with OpenAI, and it is powered by the OpenAI Codex system, which was trained on a large concentration of public source code.", "course": "copilot", "source": "Copilot Fundamentals · Introduction to GitHub Copilot / AI pair programmer"}, {"question": "In which of the following environments is GitHub Copilot available as an extension? (Choose all that apply.)", "type": "multiple", "options": [{"text": "Visual Studio Code", "correct": true}, {"text": "Visual Studio", "correct": true}, {"text": "Vim/Neovim", "correct": true}, {"text": "The JetBrains suite of IDEs", "correct": true}, {"text": "Microsoft Word", "correct": false}], "explanation": "GitHub Copilot is available as an extension for VS Code, Visual Studio, Vim/Neovim, and the JetBrains suite of IDEs.", "course": "copilot", "source": "Copilot Fundamentals · Introduction to GitHub Copilot / AI pair programmer"}, {"question": "What does the Copilot chat experience inside a supported editor let you do?", "type": "single", "options": [{"text": "Ask questions about your code, get explanations of logic or errors, and generate tests or documentation using your project context", "correct": true}, {"text": "Only autocomplete a single line of code at a time with no conversation", "correct": false}, {"text": "Replace your editor's source control with a built-in Git client", "correct": false}, {"text": "Deploy your application to a cloud provider", "correct": false}], "explanation": "Copilot chat is an interactive experience in supported editors. It understands your code context so you can ask questions, get explanations of logic or errors, and generate tests, documentation, or implementation ideas.", "course": "copilot", "source": "Copilot Fundamentals · Introduction to GitHub Copilot / AI pair programmer"}, {"question": "When you open a pull request, how can GitHub Copilot help reviewers?", "type": "single", "options": [{"text": "It can automatically generate a summary description of the changes", "correct": true}, {"text": "It automatically merges the pull request once checks pass", "correct": false}, {"text": "It deletes the source branch after review", "correct": false}, {"text": "It assigns reviewers based on repository billing", "correct": false}], "explanation": "Copilot can automatically generate a pull request summary of the changes, helping reviewers understand intent and reducing the effort of writing PR descriptions.", "course": "copilot", "source": "Copilot Fundamentals · Introduction to GitHub Copilot / AI pair programmer"}, {"question": "What is the purpose of the GitHub Copilot command-line interface (CLI)?", "type": "single", "options": [{"text": "To ask for command suggestions, generate shell scripts, and understand command output or errors in the terminal", "correct": true}, {"text": "To replace Git as the version control system", "correct": false}, {"text": "To host static websites from the terminal", "correct": false}, {"text": "To manage organization billing from the command line", "correct": false}], "explanation": "Copilot for the CLI helps in the terminal: you can ask for command suggestions and code snippets, generate shell scripts, and understand output or errors.", "course": "copilot", "source": "Copilot Fundamentals · Introduction to GitHub Copilot / AI pair programmer"}, {"question": "How do inline suggestions appear, and how do you accept one in your editor?", "type": "single", "options": [{"text": "They appear as grayed-out text ahead of the cursor, and you accept by pressing the Tab key", "correct": true}, {"text": "They appear in a popup dialog, and you accept by pressing Enter twice", "correct": false}, {"text": "They appear highlighted in red, and you accept by pressing Esc", "correct": false}, {"text": "They appear only in the chat panel, and you accept by clicking Subm
